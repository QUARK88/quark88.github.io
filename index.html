<style>
    @font-face {
        font-family: font1;
        src: url(font1.otf);
    }

    @font-face {
        font-family: font2;
        src: url(font2.ttf);
    }

    @keyframes gradient {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    html {
        background-color: #000;
    }

    body {
        background: linear-gradient(-45deg, #0080e0, #0080e0, #0060c0, #0060c0);
        background-size: 400% 400%;
        animation: gradient 10s ease-in-out infinite;
        margin: 0;
        padding: 32px;
    }

    h1 {
        color: #fff;
        font-family: font2;
        font-size: 64px;
        margin-bottom: 0px;
        margin-top: 0px;
        text-align: center;
        text-shadow: 4px 4px #00b5ff, 3px 3px #00b5ff, 2px 2px #00b5ff, 1px 1px #00b5ff;
    }

    h2 {
        color: #fff;
        font-family: font1;

        text-align: center;
    }

    .pfp {
        margin-bottom: 32px;
        transition: all .2s ease-in-out;
    }

    img.pfp:hover {
        transform: scale(1.05);
        box-shadow: 0 0 0 0 #00000040, 0 8px 16px 0 #00000040;
    }

    .button {
        background-color: #00a0e0;
        font-family: font1 !important;
        border: 0;
        border-radius: 32px;
        color: #fff;
        cursor: pointer;
        display: inline-block;
        font-size: 48px;
        margin: 1%;
        padding: 16px;
        text-align: center;
        width: 48%;
        margin-bottom: 24px;
        margin-top: 24px;
        transition: all .2s ease-in-out;
    }

    button:hover {
        transform: scale(1.025);
        box-shadow: 0 0 0 0 #00000040, 0 8px 16px 0 #00000040;
    }
